services:
  # Web Service - Main Flask Application
  - type: web
    name: 16chan-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: 16chan-db
          property: connectionString
    healthCheckPath: /
    autoDeploy: true

  # Background Worker - Decay System
  - type: worker
    name: 16chan-decay-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python decay_worker.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: 16chan-db
          property: connectionString
    autoDeploy: true

# PostgreSQL Database
databases:
  - name: 16chan-db
    databaseName: chan16
    user: chan16_user
    plan: free