name: 16chan Decay Trigger

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render and Run Decay
        run: |
          curl --retry 3 --retry-delay 10 --max-time 60 \
          -X POST https://your-app-name.onrender.com/internal/run-decay \
          -H "Authorization: Bearer ${{ secrets.DECAY_SECRET }}"